name = "chat-watch-worker"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Cron: every minute
[triggers]
crons = ["*/1 * * * *"]

# KV namespace for state. Create with:
#   wrangler kv namespace create STATE
#   wrangler kv namespace create STATE --preview
# Then paste the IDs below.
[[kv_namespaces]]
binding = "STATE"
id = "PUT_KV_ID_HERE"
preview_id = "PUT_KV_PREVIEW_ID_HERE"

[vars]
MAX_PAGES = "80"
WEBHOOK_TYPE = "discord"
# TARGET_TITLE can also be put here as plain text if you prefer (not a secret).
# TARGET_ID    = "699244bce7401621a87adf10"

# Worker secrets (do NOT put values here):
#   wrangler secret put WEBHOOK_URL    # Discord webhook URL
#   wrangler secret put TARGET_ID      # 24-char ObjectId
# (TARGET_ID may be a [vars] entry instead — it's not sensitive.)
# Optional:
#   wrangler secret put RUN_TOKEN      # for manual /run trigger
